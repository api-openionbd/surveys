<!DOCTYPE html>
<html>
<head>
  <title>140 Question Survey</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 40px; }
    .box { max-width: 700px; margin: auto; }
    button { padding: 10px 20px; margin-top: 20px; }
  </style>
</head>
<body>

<div class="box">
  <h3 id="progress"></h3>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <button onclick="next()">Next</button>
</div>

<script>
const survey = [];

// Helper functions
function addText(q){ survey.push({type:"text", q}); }
function addMCQ(q, opts){ survey.push({type:"mcq", q, opts}); }
function addScale(q){ survey.push({type:"scale", q, opts:["Strongly Agree","Agree","Neutral","Disagree","Strongly Disagree"]}); }

// --- SECTION 1: Technology & AI ---
for(let i=1;i<=20;i++){
  if(i%3===0) addText("AI Q"+i+": What excites you about AI?");
  else if(i%2===0) addScale("AI Q"+i+": AI improves life quality.");
  else addMCQ("AI Q"+i+": Do you use AI daily?",["Yes","No","Sometimes"]);
}

// --- SECTION 2: Education ---
for(let i=1;i<=20;i++){
  if(i%3===0) addText("Education Q"+i+": What skill do you want to learn?");
  else if(i%2===0) addScale("Education Q"+i+": Online learning is effective.");
  else addMCQ("Education Q"+i+": Preferred learning?",["Online","Offline","Hybrid"]);
}

// --- SECTION 3: Health ---
for(let i=1;i<=20;i++){
  if(i%3===0) addText("Health Q"+i+": What motivates you to stay healthy?");
  else if(i%2===0) addScale("Health Q"+i+": I maintain a healthy lifestyle.");
  else addMCQ("Health Q"+i+": Exercise weekly?",["Yes","No","Sometimes"]);
}

// --- SECTION 4: Entertainment ---
for(let i=1;i<=20;i++){
  if(i%3===0) addText("Entertainment Q"+i+": Favorite movie?");
  else if(i%2===0) addScale("Entertainment Q"+i+": I enjoy streaming content.");
  else addMCQ("Entertainment Q"+i+": Watch daily?",["Yes","No","Sometimes"]);
}

// --- SECTION 5: Community ---
for(let i=1;i<=20;i++){
  if(i%3===0) addText("Community Q"+i+": What makes a strong community?");
  else if(i%2===0) addScale("Community Q"+i+": I feel socially connected.");
  else addMCQ("Community Q"+i+": Attend events?",["Yes","No","Sometimes"]);
}

// --- SECTION 6: Environment ---
for(let i=1;i<=20;i++){
  if(i%3===0) addText("Environment Q"+i+": Your eco habit?");
  else if(i%2===0) addScale("Environment Q"+i+": Climate change is serious.");
  else addMCQ("Environment Q"+i+": Do you recycle?",["Yes","No","Sometimes"]);
}

// --- SECTION 7: Personal ---
for(let i=1;i<=20;i++){
  if(i%3===0) addText("Personal Q"+i+": Your biggest dream?");
  else if(i%2===0) addScale("Personal Q"+i+": I am satisfied with life.");
  else addMCQ("Personal Q"+i+": Are you happy?",["Yes","No","Sometimes"]);
}

// URL system
const params = new URLSearchParams(location.search);
let page = parseInt(params.get("page")) || 1;
let id = params.get("id") || Math.floor(1000 + Math.random()*9000);

// Load question
function load(){
  if(page > survey.length){
    document.body.innerHTML = "<h2>Done ✅</h2><p>ID: "+id+"</p>";
    return;
  }

  const q = survey[page-1];
  document.getElementById("progress").innerText = "Question "+page+" / "+survey.length;
  document.getElementById("question").innerText = q.q;

  let html = "";

  if(q.type==="text"){
    html = `<input id="ans" placeholder="Type answer...">`;
  }
  else{
    q.opts.forEach(o=>{
      html += `<div><input type="radio" name="ans" value="${o}"> ${o}</div>`;
    });
  }

  document.getElementById("answers").innerHTML = html;
}

// Next
function next(){
  let val;
  const input = document.getElementById("ans");

  if(input){
    val = input.value;
  } else {
    const checked = document.querySelector("input[name='ans']:checked");
    val = checked ? checked.value : "";
  }

  localStorage.setItem("survey_"+page, val);

  page++;
  history.pushState({}, "", `?page=${page}&id=${id}`);
  load();
}

load();
</script>

</body>
</html>
