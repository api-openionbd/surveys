<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subtar (1)</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
}

.container{
  max-width:600px;
  margin:50px auto;
  background:#fff;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.progress-bar{
  width:100%;
  height:10px;
  background:#eee;
  border-radius:10px;
  margin-bottom:15px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:#667eea;
  transition:0.3s;
}

.option{
  display:block;
  background:#f5f5f5;
  margin:8px 0;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.option:hover{
  background:#667eea;
  color:#fff;
}

button{
  margin-top:20px;
  padding:10px 20px;
  background:#667eea;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

  <div class="progress-bar">
    <div class="progress-fill" id="bar"></div>
  </div>

  <h3 id="progress"></h3>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <div id="error" style="color:red;"></div>
  <button onclick="next()">Next</button>
</div>

<script>

// -------- SURVEY --------
const survey = [];

const yesNo = ["Yes","No"];
const likert = [
  "Strongly Agree","Agree","Neutral","Disagree","Strongly Disagree"
];

function add(section, questions, type="likert"){
  questions.forEach(q=>{
    survey.push({
      section,
      q:q,
      opts: type==="mcq" ? yesNo : likert,
      required:true
    });
  });
}

// -------- DEMOGRAPHICS --------
survey.push({section:"Demographics",q:"What is your age group?",opts:["Under 18","18-24","25-34","35-44","45+"],required:true});
survey.push({section:"Demographics",q:"What is your gender?",opts:["Male","Female","Other"],required:true});
survey.push({section:"Demographics",q:"Your education level?",opts:["School","College","University","Other"],required:true});
survey.push({section:"Demographics",q:"Your occupation?",opts:["Student","Job","Business","Other"],required:true});
survey.push({section:"Demographics",q:"Your country?",opts:["Bangladesh","India","USA","Other"],required:true});

// -------- SECTIONS --------
add("AI",["AI improves productivity","I trust AI","AI is useful","AI replaces jobs","AI is safe","AI saves time","AI easy to use","AI regulated","AI creative","AI accessible","AI business","AI overhyped","AI future","AI reduces effort","AI learning","AI trustworthy","AI improves life","AI helps decisions","AI useful daily","Excited about AI"]);

add("Education",["Prefer online learning","Education effective","Use YouTube","AI tutors helpful","Enjoy learning","Accessible education","Teachers effective","Exams fair","Affordable education","Learn daily","School prepares life","Self learning","Education change","Enjoy study","Learning fun","Online courses","Improve skills","Education improves life","Value education","Want new skills"]);

add("Health",["Exercise","Eat healthy","Sleep well","Use health apps","Drink water","Avoid junk","Mental health care","Feel energetic","Manage stress","Routine","Visit doctor","Track fitness","Feel healthy","Eat fruits","Avoid sugar","Walk daily","Feel active","Meditate","Balance life","Focus fitness"]);

add("Entertainment",["Watch movies","Prefer series","Use streaming","Play games","Follow influencers","Use social media","Enjoy music","Watch YouTube","Online time","Enjoy content","Follow trends","Binge watch","Watch TV","Enjoy cinema","Play mobile games","Use TikTok","Watch Netflix","Watch streams","Use apps","Enjoy viral"]);

add("Community",["Attend events","Volunteer","Feel connected","Help others","Trust people","Social engagement","Community work","Meet friends","Communicate","Support groups","Join activities","Belonging","Help neighbors","Attend gatherings","Teamwork","Value friends","Feel supported","Trust community","Online groups","Care society"]);

add("Environment",["Recycle","Save energy","Care environment","Avoid plastic","Eco products","Save water","Climate concern","Eco use","Reduce waste","Reuse","Plant trees","Sustainability","Eco brands","Avoid pollution","Future care","Walk more","Save electricity","Green policy","Care animals","Eco actions"]);

add("Personal",["Family important","Money happiness","Tech improves life","Satisfied","Set goals","Stay positive","Time manage","Motivated","Feel success","Help others","Believe growth","Enjoy life","Take risks","Learn failure","Stay focused"]);

// -------- URL --------
const params = new URLSearchParams(location.search);
let page = parseInt(params.get("page")) || 1;
let id = params.get("id") || Math.floor(1000+Math.random()*9000);
let reloadCount = parseInt(params.get("reload")) || 0;

// -------- LOAD --------
async function load(){

  if(page > survey.length){
    try{
      let res = await fetch("https://ipapi.co/json/");
      let data = await res.json();

      if(data.country_code === "US"){
        window.location.href = "https://success.trayistats.com/?113=1&122=3&15297=4&2189=1&42=45&43=1&45=20011&47=1&5729=48&61076=20&96=9&97=511&RPI=1.225&UID=076e0604-af81-44fa-a1b5-75875d983786&l=20&mid=26943879&pid=9494596&sur=74673205&hash=JXtuKMTSvCYUzBc2d20LqGZW5dA";
      } else {
        window.location.href = "https://openionbd.2bd.net/success.html?id="+id;
      }

    }catch(e){
      window.location.href = "https://openionbd.2bd.net/success.html?id="+id;
    }
    return;
  }

  const q = survey[page-1];

  document.title = `Subtar (${page})`;

  let percent = (page/survey.length)*100;
  document.getElementById("bar").style.width = percent + "%";

  document.getElementById("progress").innerText =
    `${q.section} - Question ${page}/${survey.length}`;

  document.getElementById("question").innerText = q.q;
  document.getElementById("error").innerText = "";

  let html = "";
  q.opts.forEach(o=>{
    html += `<label class="option">
      <input type="radio" name="ans" value="${o}"> ${o}
    </label>`;
  });

  document.getElementById("answers").innerHTML = html;
}

// -------- NEXT --------
function next(){
  const checked = document.querySelector("input[name='ans']:checked");

  if(!checked){
    document.getElementById("error").innerText = "Answer required!";
    return;
  }

  localStorage.setItem("q"+page, checked.value);

  let nextPage = page + 1;

  const currentSection = survey[page-1].section;
  const nextSection = survey[nextPage-1] ? survey[nextPage-1].section : null;

  if(currentSection !== nextSection && nextSection !== null){
    if(reloadCount < 5){
      window.location.href = `?page=${nextPage}&id=${id}&reload=${reloadCount+1}`;
      return;
    } else {
      reloadCount = 0;
    }
  }

  window.location.href = `?page=${nextPage}&id=${id}&reload=0`;
}

load();

</script>

</body>
</html>
