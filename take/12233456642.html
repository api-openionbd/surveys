<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Survey</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  margin: 0;
  color: #333;
}

.container {
  max-width: 600px;
  margin: 60px auto;
  background: #fff;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

h2 { margin-bottom: 20px; }

.progress-bar {
  height: 8px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  transition: width 0.3s;
}

.option {
  display: block;
  background: #f5f5f5;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.option:hover {
  background: #e0e0ff;
}

input[type="text"] {
  width: 90%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  background: #667eea;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #5a67d8;
}

#progressText {
  font-size: 14px;
  margin-bottom: 10px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">
  <div id="progressText"></div>
  <div class="progress-bar"><div class="progress" id="bar"></div></div>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <button onclick="next()">Next</button>
</div>

<script>
// Build 140 questions
const survey = [];

function addText(q){ survey.push({type:"text", q}); }
function addMCQ(q, opts){ survey.push({type:"mcq", q, opts}); }
function addScale(q){ survey.push({type:"scale", q, opts:["Strongly Agree","Agree","Neutral","Disagree","Strongly Disagree"]}); }

// Sections
for(let i=1;i<=20;i++){
  if(i%3===0) addText("AI Q"+i+": What excites you about AI?");
  else if(i%2===0) addScale("AI Q"+i+": AI improves life.");
  else addMCQ("AI Q"+i+": Do you use AI?",["Yes","No","Sometimes"]);
}
for(let i=1;i<=120;i++){
  if(i%3===0) addText("Q"+(i+20)+": Share your opinion.");
  else if(i%2===0) addScale("Q"+(i+20)+": I agree with this statement.");
  else addMCQ("Q"+(i+20)+": Choose option.",["Yes","No","Maybe"]);
}

// URL system
const params = new URLSearchParams(location.search);
let page = parseInt(params.get("page")) || 1;
let id = params.get("id") || Math.floor(1000 + Math.random()*9000);

// Load question
function load(){
  if(page > survey.length){
    // 🔁 REDIRECT HERE
    window.location.href = "https://openionbd.2bd.net/success.html?id=" + id;
    return;
  }

  const q = survey[page-1];

  document.getElementById("question").innerText = q.q;
  document.getElementById("progressText").innerText = "Question " + page + " of " + survey.length;

  // progress bar
  document.getElementById("bar").style.width = ((page/survey.length)*100) + "%";

  let html = "";

  if(q.type==="text"){
    html = `<input id="ans" placeholder="Type your answer...">`;
  } else {
    q.opts.forEach(o=>{
      html += `<label class="option">
        <input type="radio" name="ans" value="${o}"> ${o}
      </label>`;
    });
  }

  document.getElementById("answers").innerHTML = html;
}

// Next
function next(){
  let val = "";

  const input = document.getElementById("ans");
  if(input){
    val = input.value;
  } else {
    const checked = document.querySelector("input[name='ans']:checked");
    if(checked) val = checked.value;
  }

  localStorage.setItem("survey_"+page, val);

  page++;
  history.pushState({}, "", `?page=${page}&id=${id}`);
  load();
}

load();
</script>

</body>
</html>
