<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subtar (1)</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
}

.container{
  max-width:600px;
  margin:50px auto;
  background:#fff;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.progress-bar{
  width:100%;
  height:10px;
  background:#eee;
  border-radius:10px;
  margin-bottom:15px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:#667eea;
  transition:0.3s;
}

.option{
  display:block;
  background:#f5f5f5;
  margin:8px 0;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.option:hover{
  background:#667eea;
  color:#fff;
}

button{
  margin-top:20px;
  padding:10px 20px;
  background:#667eea;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

  <div class="progress-bar">
    <div class="progress-fill" id="bar"></div>
  </div>

  <h3 id="progress"></h3>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <div id="error" style="color:red;"></div>
  <button onclick="next()">Next</button>
</div>

<script>

// -------- SURVEY --------
const survey = [];

// Option sets
const yesNo = ["Yes","No"];
const likert = [
  "Strongly Agree",
  "Agree",
  "Neutral",
  "Disagree",
  "Strongly Disagree"
];

// helper
function add(section, questions, type="likert"){
  questions.forEach(q=>{
    survey.push({
      section,
      q:q,
      opts: type==="mcq" ? yesNo : likert,
      required:true
    });
  });
}

// -------- DEMOGRAPHICS --------
survey.push({section:"Demographics",q:"What is your age group?",opts:["Under 18","18-24","25-34","35-44","45+"],required:true});
survey.push({section:"Demographics",q:"What is your gender?",opts:["Male","Female","Other"],required:true});
survey.push({section:"Demographics",q:"Your education level?",opts:["School","College","University","Other"],required:true});
survey.push({section:"Demographics",q:"Your occupation?",opts:["Student","Job","Business","Other"],required:true});
survey.push({section:"Demographics",q:"Your country?",opts:["Bangladesh","India","USA","Other"],required:true});

// -------- AI --------
add("AI",[
"AI improves productivity","I trust AI recommendations","AI is useful in education",
"AI will replace jobs","AI is safe for society","AI saves time",
"AI is easy to use","AI should be regulated","AI improves creativity",
"AI is accessible","AI improves business","AI is overhyped",
"AI will dominate future","AI reduces effort","AI improves learning",
"AI is trustworthy","AI improves life","AI helps decisions",
"AI is useful daily","I am excited about AI"
]);

// -------- EDUCATION --------
add("Education",[
"I prefer online learning","Education system is effective","I use YouTube for learning",
"AI tutors are helpful","I enjoy learning","Education is accessible",
"Teachers are effective","Exams are fair","Education is affordable",
"I learn daily","School prepares for life","I like self-learning",
"Education should change","I enjoy studying","Learning is fun",
"I take online courses","I improve skills","Education improves life",
"I value education","I want new skills"
]);

// -------- HEALTH --------
add("Health",[
"I exercise regularly","I eat healthy","I sleep well","I use health apps",
"I drink enough water","I avoid junk food","I care mental health",
"I feel energetic","I manage stress","I follow routine",
"I visit doctors","I track fitness","I feel healthy",
"I eat fruits","I avoid sugar","I walk daily",
"I feel active","I meditate","I balance life","I focus on fitness"
]);

// -------- ENTERTAINMENT --------
add("Entertainment",[
"I watch movies","I prefer series","I use streaming apps","I play games",
"I follow influencers","I use social media","I enjoy music",
"I watch YouTube","I spend time online","I enjoy content",
"I follow trends","I binge watch","I watch TV","I enjoy cinema",
"I play mobile games","I use TikTok","I watch Netflix",
"I watch streams","I use apps","I enjoy viral content"
]);

// -------- COMMUNITY --------
add("Community",[
"I attend events","I volunteer","I feel connected","I help others",
"I trust people","I engage socially","I like community work",
"I meet friends","I communicate often","I support groups",
"I join activities","I feel belonging","I help neighbors",
"I attend gatherings","I enjoy teamwork","I value friends",
"I feel supported","I trust community","I join online groups","I care society"
]);

// -------- ENVIRONMENT --------
add("Environment",[
"I recycle","I save energy","I care environment","I avoid plastic",
"I support eco products","I save water","I care climate change",
"I use eco items","I reduce waste","I reuse items",
"I plant trees","I support sustainability","I buy eco brands",
"I avoid pollution","I care future","I walk instead drive",
"I save electricity","I support green policy","I care animals","I take eco actions"
]);

// -------- PERSONAL --------
add("Personal",[
"Family is important","Money brings happiness","Technology improves life",
"I am satisfied","I set goals","I stay positive",
"I manage time","I am motivated","I feel successful",
"I help others","I believe growth","I enjoy life",
"I take risks","I learn from failure","I stay focused"
]);

// -------- URL --------
const params = new URLSearchParams(location.search);
let page = parseInt(params.get("page")) || 1;
let id = params.get("id") || Math.floor(1000+Math.random()*9000);
let reloadCount = parseInt(params.get("reload")) || 0;

// -------- LOAD --------
function load(){
  if(page > survey.length){
    window.location.href = "https://openionbd.2bd.net/success.html?id="+id;
    return;
  }

  const q = survey[page-1];

  document.title = `Subtar (${page})`;

  let percent = (page/survey.length)*100;
  document.getElementById("bar").style.width = percent + "%";

  document.getElementById("progress").innerText =
    `${q.section} - Question ${page}/${survey.length}`;

  document.getElementById("question").innerText = q.q;
  document.getElementById("error").innerText = "";

  let html = "";
  q.opts.forEach(o=>{
    html += `<label class="option">
      <input type="radio" name="ans" value="${o}"> ${o}
    </label>`;
  });

  document.getElementById("answers").innerHTML = html;
}

// -------- NEXT --------
function next(){
  const checked = document.querySelector("input[name='ans']:checked");

  if(!checked){
    document.getElementById("error").innerText = "Answer required!";
    return;
  }

  localStorage.setItem("q"+page, checked.value);

  let nextPage = page + 1;

  const currentSection = survey[page-1].section;
  const nextSection = survey[nextPage-1] ? survey[nextPage-1].section : null;

  if(currentSection !== nextSection && nextSection !== null){
    if(reloadCount < 5){
      window.location.href = `?page=${nextPage}&id=${id}&reload=${reloadCount+1}`;
      return;
    } else {
      reloadCount = 0;
    }
  }

  window.location.href = `?page=${nextPage}&id=${id}&reload=0`;
}

load();

</script>

</body>
</html>
