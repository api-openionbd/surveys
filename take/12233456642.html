<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subtar (1)</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
}

.container{
  max-width:600px;
  margin:50px auto;
  background:#fff;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

.option{
  display:block;
  background:#f5f5f5;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

button{
  margin-top:20px;
  padding:10px 20px;
  background:#667eea;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">
  <h3 id="progress"></h3>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <div id="error" style="color:red;"></div>
  <button onclick="next()">Next</button>
</div>

<script>
// -------- SURVEY --------
const survey = [];

// Sections helper
function addSection(name, count){
  for(let i=1;i<=count;i++){
    survey.push({
      section:name,
      type:"mcq",
      q:`${name} Q${i}: Choose option`,
      opts:["Yes","No","Maybe"],
      required:true
    });
  }
}

// Demographics
addSection("Demographics",5);

// Other sections
addSection("AI",20);
addSection("Education",20);
addSection("Health",20);
addSection("Entertainment",20);
addSection("Community",20);
addSection("Environment",20);
addSection("Personal",15); // total ~140

// -------- URL --------
const params = new URLSearchParams(location.search);
let page = parseInt(params.get("page")) || 1;
let id = params.get("id") || Math.floor(1000+Math.random()*9000);

// reload counter
let reloadCount = parseInt(params.get("reload")) || 0;

// -------- LOAD --------
function load(){
  if(page > survey.length){
    window.location.href = "https://openionbd.2bd.net/success.html?id="+id;
    return;
  }

  const q = survey[page-1];

  // 🔥 TAB TITLE COUNTER
  document.title = `Subtar (${page})`;

  document.getElementById("progress").innerText = `${q.section} - Question ${page}/${survey.length}`;
  document.getElementById("question").innerText = q.q;
  document.getElementById("error").innerText = "";

  let html = "";
  q.opts.forEach(o=>{
    html += `<label class="option">
      <input type="radio" name="ans" value="${o}"> ${o}
    </label>`;
  });

  document.getElementById("answers").innerHTML = html;
}

// -------- NEXT --------
function next(){
  const checked = document.querySelector("input[name='ans']:checked");

  if(!checked){
    document.getElementById("error").innerText = "Answer required!";
    return;
  }

  localStorage.setItem("q"+page, checked.value);

  let nextPage = page + 1;

  // 🔥 CHECK SECTION CHANGE
  const currentSection = survey[page-1].section;
  const nextSection = survey[nextPage-1] ? survey[nextPage-1].section : null;

  // 🔁 RELOAD 5 TIMES WHEN SECTION CHANGES
  if(currentSection !== nextSection && nextSection !== null){
    if(reloadCount < 5){
      window.location.href = `?page=${nextPage}&id=${id}&reload=${reloadCount+1}`;
      return;
    } else {
      reloadCount = 0; // reset
    }
  }

  // NORMAL NAV
  window.location.href = `?page=${nextPage}&id=${id}&reload=0`;
}

load();
</script>

</body>
</html>
