<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subtar (1)</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
}

.container{
  max-width:600px;
  margin:50px auto;
  background:#fff;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* ✅ NEW PROGRESS BAR */
.progress-bar{
  width:100%;
  height:10px;
  background:#eee;
  border-radius:10px;
  margin-bottom:15px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:#667eea;
  transition:0.3s;
}

.option{
  display:block;
  background:#f5f5f5;
  margin:8px 0;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.option:hover{
  background:#667eea;
  color:#fff;
}

button{
  margin-top:20px;
  padding:10px 20px;
  background:#667eea;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

  <!-- ✅ PROGRESS BAR -->
  <div class="progress-bar">
    <div class="progress-fill" id="bar"></div>
  </div>

  <h3 id="progress"></h3>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <div id="error" style="color:red;"></div>
  <button onclick="next()">Next</button>
</div>

<script>
// -------- SURVEY --------
const survey = [];

// helper
function add(section, questions){
  questions.forEach(q=>{
    survey.push({
      section,
      type:"mcq",
      q:q,
      opts:["Yes","No","Maybe"],
      required:true
    });
  });
}

// -------- DEMOGRAPHICS --------
add("Demographics",[
"What is your age group?",
"What is your gender?",
"What is your education level?",
"What is your occupation?",
"Which country do you live in?"
]);

// -------- AI --------
add("AI",[
"Do you use AI tools daily?",
"Do you trust AI recommendations?",
"Is AI helpful in education?",
"Will AI replace jobs?",
"Is AI safe for society?",
"Does AI improve productivity?",
"Is AI easy to use?",
"Should AI be regulated?",
"Does AI save time?",
"Is AI accessible to everyone?",
"Does AI improve creativity?",
"Is AI trustworthy?",
"Will AI dominate the future?",
"Does AI reduce human effort?",
"Is AI overhyped?",
"Does AI improve daily life?",
"Is AI beneficial for business?",
"Does AI improve decision making?",
"Is AI useful for students?",
"Are you excited about AI?"
]);

// -------- EDUCATION --------
add("Education",[
"Do you prefer online learning?",
"Is your education system effective?",
"Do you use YouTube to learn?",
"Are AI tutors helpful?",
"Do you enjoy learning new skills?",
"Is education accessible to you?",
"Are teachers effective?",
"Are exams fair?",
"Is education affordable?",
"Do you learn daily?",
"Does school prepare you for life?",
"Do you like self-learning?",
"Should education change?",
"Do you enjoy studying?",
"Is learning fun?",
"Do you take online courses?",
"Do you improve skills regularly?",
"Does education improve life?",
"Do you value education?",
"Do you want to learn new skills?"
]);

// -------- HEALTH --------
add("Health",[
"Do you exercise regularly?",
"Do you eat healthy food?",
"Do you sleep well?",
"Do you use health apps?",
"Do you drink enough water?",
"Do you avoid junk food?",
"Do you care about mental health?",
"Do you feel energetic daily?",
"Do you manage stress well?",
"Do you follow a routine?",
"Do you visit doctors regularly?",
"Do you track fitness?",
"Do you feel healthy?",
"Do you eat fruits daily?",
"Do you avoid sugar?",
"Do you walk daily?",
"Do you feel active?",
"Do you meditate?",
"Do you maintain balance in life?",
"Do you focus on fitness?"
]);

// -------- ENTERTAINMENT --------
add("Entertainment",[
"Do you watch movies regularly?",
"Do you prefer series over movies?",
"Do you use streaming platforms?",
"Do you play games?",
"Do you follow influencers?",
"Do you use social media daily?",
"Do you enjoy music?",
"Do you watch YouTube daily?",
"Do you spend time online?",
"Do you enjoy entertainment content?",
"Do you follow trends?",
"Do you binge watch shows?",
"Do you watch TV daily?",
"Do you enjoy cinema?",
"Do you play mobile games?",
"Do you use TikTok?",
"Do you watch Netflix?",
"Do you watch live streams?",
"Do you like entertainment apps?",
"Do you enjoy viral content?"
]);

// -------- COMMUNITY --------
add("Community",[
"Do you attend events?",
"Do you volunteer?",
"Do you feel connected to your community?",
"Do you help others?",
"Do you trust people?",
"Do you engage socially?",
"Do you like community work?",
"Do you meet friends often?",
"Do you communicate regularly?",
"Do you support local groups?",
"Do you join activities?",
"Do you feel a sense of belonging?",
"Do you help neighbors?",
"Do you attend gatherings?",
"Do you enjoy teamwork?",
"Do you value friendships?",
"Do you feel supported?",
"Do you trust your community?",
"Do you engage in online groups?",
"Do you care about your society?"
]);

// -------- ENVIRONMENT --------
add("Environment",[
"Do you recycle regularly?",
"Do you save energy?",
"Do you care about the environment?",
"Do you avoid plastic?",
"Do you support eco-friendly products?",
"Do you conserve water?",
"Do you care about climate change?",
"Do you use eco products?",
"Do you reduce waste?",
"Do you reuse items?",
"Do you plant trees?",
"Do you support sustainability?",
"Do you buy eco brands?",
"Do you avoid pollution?",
"Do you care about the planet’s future?",
"Do you walk instead of driving?",
"Do you save electricity?",
"Do you support green policies?",
"Do you care about animals?",
"Do you take eco-friendly actions?"
]);

// -------- PERSONAL --------
add("Personal",[
"Is family important to you?",
"Does money bring happiness?",
"Does technology improve life?",
"Are you satisfied with your life?",
"Do you set goals?",
"Do you stay positive?",
"Do you manage time well?",
"Are you motivated?",
"Do you feel successful?",
"Do you help others?",
"Do you believe in self-growth?",
"Do you enjoy life?",
"Do you take risks?",
"Do you learn from failure?",
"Do you stay focused?"
]);

// -------- URL --------
const params = new URLSearchParams(location.search);
let page = parseInt(params.get("page")) || 1;
let id = params.get("id") || Math.floor(1000+Math.random()*9000);
let reloadCount = parseInt(params.get("reload")) || 0;

// -------- LOAD --------
function load(){
  if(page > survey.length){
    window.location.href = "https://openionbd.2bd.net/success.html?id="+id;
    return;
  }

  const q = survey[page-1];

  document.title = `Subtar (${page})`;

  // ✅ UPDATE PROGRESS BAR
  let percent = (page/survey.length)*100;
  document.getElementById("bar").style.width = percent + "%";

  document.getElementById("progress").innerText =
    `${q.section} - Question ${page}/${survey.length}`;

  document.getElementById("question").innerText = q.q;
  document.getElementById("error").innerText = "";

  let html = "";
  q.opts.forEach(o=>{
    html += `<label class="option">
      <input type="radio" name="ans" value="${o}"> ${o}
    </label>`;
  });

  document.getElementById("answers").innerHTML = html;
}

// -------- NEXT --------
function next(){
  const checked = document.querySelector("input[name='ans']:checked");

  if(!checked){
    document.getElementById("error").innerText = "Answer required!";
    return;
  }

  localStorage.setItem("q"+page, checked.value);

  let nextPage = page + 1;

  const currentSection = survey[page-1].section;
  const nextSection = survey[nextPage-1] ? survey[nextPage-1].section : null;

  if(currentSection !== nextSection && nextSection !== null){
    if(reloadCount < 5){
      window.location.href = `?page=${nextPage}&id=${id}&reload=${reloadCount+1}`;
      return;
    } else {
      reloadCount = 0;
    }
  }

  window.location.href = `?page=${nextPage}&id=${id}&reload=0`;
}

load();
</script>

</body>
</html>
