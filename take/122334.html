<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Metaexpress.com (1)</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
}

.container{
  max-width:600px;
  margin:50px auto;
  background:#fff;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.progress-bar{
  width:100%;
  height:10px;
  background:#eee;
  border-radius:10px;
  margin-bottom:15px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:#667eea;
  transition:0.3s;
}

.option{
  display:block;
  background:#f5f5f5;
  margin:8px 0;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
}

button{
  margin-top:20px;
  padding:10px 20px;
  background:#667eea;
  color:white;
  border:none;
  border-radius:8px;
}

.video-ad{
  margin:15px 0;
  display:none;
}
.video-ad iframe{
  width:100%;
  height:250px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="progress-bar">
    <div class="progress-fill" id="bar"></div>
  </div>

  <h3 id="progress"></h3>
  <h2 id="question"></h2>

  <!-- 🎥 VIDEO PAGE -->
  <div class="video-ad" id="videoBox">
    <iframe 
      id="videoFrame"
      src=""
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <div id="answers"></div>
  <div id="error" style="color:red;"></div>
  <button onclick="next()">Next</button>

</div>

<script>

// -------- SURVEY --------
const survey = [];
const likert = ["Strongly Agree","Agree","Neutral","Disagree","Strongly Disagree"];

function add(section, arr){
  arr.forEach(q=>survey.push({section,q,opts:likert}));
}

// -------- 100 QUESTIONS --------

// 1 Awareness (15)
add("Awareness",[
"Follow political news regularly","Understand political systems",
"Know national leaders","Discuss politics often","Trust news sources",
"Vote in elections","Vote matters","Know constitution",
"Political education important","Engaged in civic life",
"Follow global politics","Aware of policies","Read political content",
"Understand rights","Stay updated daily"
]);

// 2 Governance (15)
add("Governance",[
"Trust judiciary","Government transparent","Corruption high",
"Term limits needed","Military influence bad","Politicians honest",
"Public funding ok","Election fair","Referendums useful","Bureaucracy slow",
"Government efficient","Leaders accountable","Institutions strong",
"Law enforcement fair","Anti-corruption effective"
]);

// 3 Ideology (15)
add("Ideology",[
"Support capitalism","Free healthcare","Free education",
"Higher tax rich","Religion in politics","Free speech",
"Restrict hate speech","Immigration good","Nationalism good","Globalization good",
"Equality important","Freedom important","Social justice matters",
"Government role big","Private sector better"
]);

// 4 Elections (15)
add("Elections",[
"Elections are fair","Voting easy","Voting secure",
"Campaigns honest","Media neutral","Parties trustworthy",
"Independent candidates good","Ads regulated","Voting age fair",
"Online voting safe","High turnout important","Election monitoring needed",
"Debates useful","Manifestos clear","Political funding transparent"
]);

// 5 Policy (15)
add("Policy",[
"Climate priority","Renewables needed","Healthcare spending",
"Defense spending","Education spending","Lower taxes",
"Farm subsidies","Min wage increase","Unemployment support",
"Housing support","Internet right","Public transport free",
"Gun control needed","Drug laws reform","Privacy laws strict"
]);

// 6 Leadership (15)
add("Leadership",[
"Trust current leaders","Leaders competent","Leaders educated",
"Leaders ethical","Leaders transparent","Leaders experienced",
"Leaders young","Leaders accountable","Leaders visionary",
"Leaders honest","Leaders relatable","Leaders decisive",
"Leaders strong","Leaders diplomatic","Leaders inspire"
]);

// 7 International (10)
add("International",[
"Global cooperation needed","Peace missions good","Accept refugees",
"Human rights priority","Trade important","Avoid war",
"Diplomacy first","Strong alliances","Reduce conflicts","Global stability matters"
]);

// -------- URL --------
const params = new URLSearchParams(location.search);
let page = parseInt(params.get("page")) || 1;
let reloadCount = parseInt(params.get("reload")) || 0;

// -------- LOAD --------
function load(){

  if(page > survey.length){
    alert("Survey Complete");
    return;
  }

  document.title = `Metaexpress.com (${page})`;

  let percent = (page/survey.length)*100;
  document.getElementById("bar").style.width = percent + "%";

  // 🎥 PAGE 56 VIDEO
  if(page === 56){

    document.getElementById("progress").innerText =
      `Advertisement - Page ${page}/${survey.length}`;

    document.getElementById("question").innerText =
      "Please watch this video before continuing";

    document.getElementById("answers").innerHTML = "";

    document.getElementById("videoBox").style.display = "block";
    document.getElementById("videoFrame").src =
      "https://www.youtube.com/embed/8cM229JkuN0?autoplay=1&mute=1";

    return;
  }

  document.getElementById("videoBox").style.display = "none";

  const q = survey[page-1];

  document.getElementById("progress").innerText =
    `${q.section} - Question ${page}/${survey.length}`;

  document.getElementById("question").innerText = q.q;
  document.getElementById("error").innerText = "";

  let html="";
  q.opts.forEach(o=>{
    html+=`<label class="option">
      <input type="radio" name="ans" value="${o}"> ${o}
    </label>`;
  });

  document.getElementById("answers").innerHTML = html;
}

// -------- NEXT --------
function next(){

  if(page === 56){
    window.location.href = `?page=${page+1}&reload=0`;
    return;
  }

  const checked = document.querySelector("input[name='ans']:checked");

  if(!checked){
    document.getElementById("error").innerText="Answer required!";
    return;
  }

  let nextPage = page + 1;

  const currentSection = survey[page-1].section;
  const nextSection = survey[nextPage-1]?.section;

  if(currentSection !== nextSection && nextSection){
    if(reloadCount < 5){
      window.location.href = `?page=${nextPage}&reload=${reloadCount+1}`;
      return;
    } else {
      reloadCount = 0;
    }
  }

  window.location.href = `?page=${nextPage}&reload=0`;
}

// -------- START --------
load();

</script>

</body>
</html>
