<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Metaexpress.com (1)</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  margin:0;
}

.container{
  max-width:600px;
  margin:50px auto;
  background:#fff;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.progress-bar{
  width:100%;
  height:10px;
  background:#eee;
  border-radius:10px;
  margin-bottom:15px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  width:0%;
  background:#667eea;
  transition:0.3s;
}

.option{
  display:block;
  background:#f5f5f5;
  margin:8px 0;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
}

button{
  margin-top:20px;
  padding:10px 20px;
  background:#667eea;
  color:white;
  border:none;
  border-radius:8px;
}

/* 🎥 VIDEO STYLE */
.video-ad{
  margin:15px 0;
}
.video-ad iframe{
  width:100%;
  height:250px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
  <div class="progress-bar">
    <div class="progress-fill" id="bar"></div>
  </div>

  <h3 id="progress"></h3>
  <h2 id="question"></h2>

  <!-- 🎥 VIDEO AD -->
  <div class="video-ad">
    <iframe src="https://www.youtube.com/embed/5x9h2kW2M7k" 
    title="Politics Video" 
    frameborder="0" 
    allowfullscreen></iframe>
  </div>

  <div id="answers"></div>
  <div id="error" style="color:red;"></div>
  <button onclick="next()">Next</button>
</div>

<script>

// -------- SURVEY --------
const survey = [];
const likert = ["Strongly Agree","Agree","Neutral","Disagree","Strongly Disagree"];

function add(section, questions){
  questions.forEach(q=>{
    survey.push({section,q,opts:likert});
  });
}

// -------- POLITICS SURVEY --------
add("Awareness",[
"Follow political news regularly","Understand political issues","Know leaders",
"Discuss politics","Trust news","Vote","Vote matters","Know constitution",
"Political education needed","Engaged in civic life"
]);

add("Governance",[
"Trust judiciary","Government transparent","Corruption high","Term limits needed",
"Military influence bad","Politicians honest","Public funding ok","Election fair",
"Referendums useful","Bureaucracy slow"
]);

add("Ideology",[
"Support capitalism","Free healthcare","Free education","Higher tax rich",
"Religion politics","Free speech","Restrict hate speech","Immigration good",
"Nationalism good","Globalization good"
]);

add("Policy",[
"Climate priority","Renewables needed","Healthcare spending","Defense spending",
"Education spending","Lower taxes","Farm subsidies","Min wage increase",
"Unemployment support","Housing support"
]);

// -------- URL --------
const params = new URLSearchParams(location.search);
let page = parseInt(params.get("page")) || 1;
let reloadCount = parseInt(params.get("reload")) || 0;

// -------- LOAD --------
function load(){

  if(page > survey.length){
    alert("Survey Complete");
    return;
  }

  const q = survey[page-1];

  document.title = `Metaexpress.com (${page})`;

  let percent = (page/survey.length)*100;
  document.getElementById("bar").style.width = percent + "%";

  document.getElementById("progress").innerText =
    `${q.section} - Question ${page}/${survey.length}`;

  document.getElementById("question").innerText = q.q;

  let html="";
  q.opts.forEach(o=>{
    html+=`<label class="option">
      <input type="radio" name="ans"> ${o}
    </label>`;
  });

  document.getElementById("answers").innerHTML = html;
}

// -------- NEXT --------
function next(){
  const checked = document.querySelector("input[name='ans']:checked");

  if(!checked){
    document.getElementById("error").innerText="Answer required!";
    return;
  }

  let nextPage = page + 1;

  const currentSection = survey[page-1].section;
  const nextSection = survey[nextPage-1] ? survey[nextPage-1].section : null;

  if(currentSection !== nextSection && nextSection !== null){
    if(reloadCount < 5){
      window.location.href = `?page=${nextPage}&reload=${reloadCount+1}`;
      return;
    } else {
      reloadCount = 0;
    }
  }

  window.location.href = `?page=${nextPage}&reload=0`;
}

load();

</script>

</body>
</html>
